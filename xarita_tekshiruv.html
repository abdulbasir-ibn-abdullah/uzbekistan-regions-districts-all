<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Tumanlar.json — koordinatalarni tekshirish</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root {
    --ink: #1c1d1f;
    --paper: #f7f5f0;
    --line: #d8d3c6;
    --accent: #b3552c;
    --accent-soft: #e8c4ad;
    --good: #4d7c4a;
    --warn: #b3552c;
    --bad: #a83232;
    --mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: var(--sans); background: var(--paper); color: var(--ink); }

  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: 100vh;
  }

  .sidebar {
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    background: var(--paper);
    overflow: hidden;
  }

  .header {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--line);
  }
  .header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: 0.01em;
  }
  .header p {
    margin: 0;
    font-size: 12px;
    color: #6b6a64;
    line-height: 1.5;
  }

  .controls {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .controls input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 13px;
    background: #fff;
  }
  .controls select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 13px;
    background: #fff;
  }
  .stat-row {
    display: flex;
    gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
  }
  .pill {
    padding: 3px 8px;
    border-radius: 100px;
    background: #fff;
    border: 1px solid var(--line);
  }
  .pill.ok { color: var(--good); border-color: var(--good); }
  .pill.flag { color: var(--bad); border-color: var(--bad); }

  .list {
    flex: 1;
    overflow-y: auto;
  }
  .region-group {
    border-bottom: 1px solid var(--line);
  }
  .region-title {
    padding: 8px 18px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8a8880;
    background: #efece3;
    position: sticky;
    top: 0;
  }
  .item {
    padding: 9px 18px;
    border-bottom: 1px solid #ece8dc;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    transition: background 0.1s;
  }
  .item:hover { background: #efe8da; }
  .item.active { background: var(--accent-soft); }
  .item.flagged { background: #f7e3da; }
  .item.flagged:hover { background: #f3d6c8; }
  .item-name {
    font-size: 13px;
    font-weight: 500;
  }
  .item-kind {
    font-size: 10px;
    color: #948f84;
    font-family: var(--mono);
  }
  .item-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .flag-btn {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b0aca0;
    flex-shrink: 0;
  }
  .flag-btn.on {
    background: var(--bad);
    border-color: var(--bad);
    color: #fff;
  }

  .map-pane {
    position: relative;
  }
  #map {
    height: 100%;
    width: 100%;
    background: #e8e4d8;
  }

  .info-card {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 16px;
    width: 280px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    font-size: 13px;
    z-index: 1000;
  }
  .info-card h2 {
    font-size: 14px;
    margin: 0 0 8px;
  }
  .info-card .row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-family: var(--mono);
    font-size: 12px;
    color: #555;
  }
  .info-card .row b { color: var(--ink); font-weight: 500; }
  .info-card a {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-soft);
  }

  .export-bar {
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    background: #efece3;
  }
  .export-bar button {
    width: 100%;
    padding: 9px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .export-bar button:hover { background: #000; }
  .leaflet-popup-content { font-family: var(--sans); font-size: 13px; }
</style>
</head>

<div class="app">
  <div class="sidebar">
    <div class="header">
      <h1>Tumanlar.json tekshiruvi</h1>
      <p>Chapdagi ro'yxatdan nuqtani tanlang — xaritada ko'rib, OpenStreetMap'dagi joy bilan solishtiring. Noto'g'ri deb hisoblasangiz, qizil bayroqcha bosing.</p>
    </div>
    <div class="controls">

    </div>
    <div class="list" id="list"></div>
    <div class="export-bar">
      <button id="exportBtn">Belgilangan xatolarni CSV qilib yuklab olish</button>
    </div>
  </div>
  <div class="map-pane">
    <div id="map"></div>
  </div>
</div>

let flagged = JSON.parse(localStorage.getItem('flagged_points') || '{}');

const map = L.map('map', { zoomControl: true }).setView([41.0, 64.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const markers = {};
let activeId = null;

function pointId(p, idx) { return idx + '::' + p.name; }

function colorFor(kind) {
  if (kind === 'viloyat') return '#b3552c';
  if (kind === 'shahar') return '#3a6ea5';
  return '#4d7c4a';
}

POINTS.forEach((p, idx) => {
  const id = pointId(p, idx);
  const isFlagged = !!flagged[id];
  const marker = L.circleMarker([p.lat, p.lon], {
    radius: p.kind === 'viloyat' ? 7 : 5,
    color: isFlagged ? '#a83232' : colorFor(p.kind),
    weight: isFlagged ? 3 : 1.5,
    fillColor: isFlagged ? '#a83232' : colorFor(p.kind),
    fillOpacity: 0.7,
  }).addTo(map);

  marker.bindPopup(buildPopupHTML(p, id));
  marker.on('click', () => selectItem(id));
  markers[id] = marker;
});

function buildPopupHTML(p, id) {
  const osmUrl = 'https://www.openstreetmap.org/search?query=' + encodeURIComponent(p.name + ' Uzbekistan') + '#map=12/' + p.lat + '/' + p.lon;
  const gmapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + p.lat + ',' + p.lon;
  return '<b>' + p.name + '</b><br>' +
    '<span style="color:#888;font-size:11px">' + p.kind + ' — ' + p.region + '</span><br>' +
    '<span style="font-family:monospace;font-size:12px">' + p.lat.toFixed(4) + ', ' + p.lon.toFixed(4) + '</span><br>' +
    '<a href="' + gmapsUrl + '" target="_blank" style="font-size:12px">Google Maps'+'da ochish &rarr;</a><br>' +
    '<a href="' + osmUrl + '" target="_blank" style="font-size:12px">OSM qidiruv &rarr;</a>';
}

// Sidebar list
const listEl = document.getElementById('list');
const regionFilterEl = document.getElementById('regionFilter');
const regions = [...new Set(POINTS.map(p => p.region))];
regions.forEach(r => {
  const opt = document.createElement('option');
  opt.value = r;
  opt.textContent = r;
  regionFilterEl.appendChild(opt);
});

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const regionFilterVal = regionFilterEl.value;
  listEl.innerHTML = '';

  let lastRegion = null;
  let count = 0;

  POINTS.forEach((p, idx) => {
    const id = pointId(p, idx);
    if (q && !p.name.toLowerCase().includes(q)) return;
    if (regionFilterVal && p.region !== regionFilterVal) return;
    count++;

    if (p.region !== lastRegion) {
      const title = document.createElement('div');
      title.className = 'region-title';
      title.textContent = p.region;
      listEl.appendChild(title);
      lastRegion = p.region;
    }

    const item = document.createElement('div');
    item.className = 'item' + (id === activeId ? ' active' : '') + (flagged[id] ? ' flagged' : '');
    item.dataset.id = id;

    const left = document.createElement('div');
    left.innerHTML = '<div class="item-name">' + p.name + '</div><div class="item-kind">' + p.kind + ' · ' + p.lat.toFixed(3) + ', ' + p.lon.toFixed(3) + '</div>';

    const right = document.createElement('div');
    right.className = 'item-right';
    const flagBtn = document.createElement('button');
    flagBtn.className = 'flag-btn' + (flagged[id] ? ' on' : '');
    flagBtn.textContent = '\u2691';
    flagBtn.title = 'Xato deb belgilash';
    flagBtn.onclick = (e) => {
      e.stopPropagation();
      toggleFlag(id);
    };
    right.appendChild(flagBtn);

    item.appendChild(left);
    item.appendChild(right);
    item.onclick = () => selectItem(id);
    listEl.appendChild(item);
  });

  document.getElementById('totalPill').textContent = 'jami: ' + count;
  document.getElementById('flagPill').textContent = 'belgilangan: ' + Object.keys(flagged).length;
}

function selectItem(id) {
  activeId = id;
  const idx = parseInt(id.split('::')[0]);
  const p = POINTS[idx];
  map.setView([p.lat, p.lon], 12, { animate: true });
  markers[id].openPopup();
  render();
}

function toggleFlag(id) {
  if (flagged[id]) {
    delete flagged[id];
  } else {
    flagged[id] = true;
  }
  localStorage.setItem('flagged_points', JSON.stringify(flagged));
  const idx = parseInt(id.split('::')[0]);
  const p = POINTS[idx];
  const isFlagged = !!flagged[id];
  markers[id].setStyle({
    color: isFlagged ? '#a83232' : colorFor(p.kind),
    weight: isFlagged ? 3 : 1.5,
    fillColor: isFlagged ? '#a83232' : colorFor(p.kind),
  });
  render();
}

document.getElementById('search').addEventListener('input', render);
regionFilterEl.addEventListener('change', render);

document.getElementById('exportBtn').addEventListener('click', () => {
  const rows = [['nomi', 'turi', 'viloyat', 'lat', 'lon']];
  Object.keys(flagged).forEach(id => {
    const idx = parseInt(id.split('::')[0]);
    const p = POINTS[idx];
    if (p) rows.push([p.name, p.kind, p.region, p.lat, p.lon]);
  });
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'belgilangan_xatolar.csv';
  a.click();
  URL.revokeObjectURL(url);
});

render();
</script>
</body>
</html>
